<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fear & Greed · Stock Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --surface: #0e1118;
    --border: #1e2230;
    --text: #e8eaf0;
    --muted: #5a6070;
    --accent: #f0c040;

    --extreme-fear: #e84040;
    --fear: #e87030;
    --neutral: #e8c040;
    --greed: #60c060;
    --extreme-greed: #30d090;

    --gauge-color: var(--neutral);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 48px;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 80px);
    letter-spacing: 2px;
    line-height: 0.9;
    color: var(--text);
  }
  .header-title span { color: var(--accent); }
  .header-sub {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding-bottom: 8px;
  }

  /* API key input */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 32px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .api-section label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .api-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-input:focus { border-color: var(--accent); }

  /* Gauge panel */
  .gauge-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 32px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 32px;
    align-items: center;
  }

  .gauge-wrap {
    position: relative;
    width: 160px;
    height: 90px;
  }
  .gauge-svg { width: 160px; height: 90px; overflow: visible; }

  .gauge-score {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }
  .gauge-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    line-height: 1;
    color: var(--gauge-color);
    transition: color 0.5s;
  }
  .gauge-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .gauge-info { display: flex; flex-direction: column; gap: 12px; }
  .gauge-sentiment {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 1px;
    color: var(--gauge-color);
    transition: color 0.5s;
  }
  .gauge-meta {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .meta-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }

  /* Scan button */
  .scan-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 16px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-bottom: 32px;
  }
  .scan-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .scan-btn:active { transform: translateY(0); }
  .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-height: 44px;
  }
  .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Stock cards */
  .stocks-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .stock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: center;
    opacity: 0;
    transform: translateY(16px);
    animation: slideIn 0.4s forwards;
  }
  .stock-card:nth-child(1) { animation-delay: 0.05s; }
  .stock-card:nth-child(2) { animation-delay: 0.12s; }
  .stock-card:nth-child(3) { animation-delay: 0.19s; }
  .stock-card:nth-child(4) { animation-delay: 0.26s; }
  .stock-card:nth-child(5) { animation-delay: 0.33s; }
  .stock-card:nth-child(6) { animation-delay: 0.40s; }
  .stock-card:nth-child(7) { animation-delay: 0.47s; }
  .stock-card:nth-child(8) { animation-delay: 0.54s; }
  .stock-card:nth-child(9) { animation-delay: 0.61s; }
  .stock-card:nth-child(10) { animation-delay: 0.68s; }

  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .stock-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--border);
    width: 32px;
    text-align: center;
  }

  .stock-body { display: flex; flex-direction: column; gap: 4px; }
  .stock-header { display: flex; align-items: baseline; gap: 10px; }
  .stock-ticker {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--accent);
  }
  .stock-name {
    font-size: 13px;
    color: var(--muted);
  }
  .stock-reason {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    opacity: 0.8;
  }

  .stock-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .risk-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .risk-low    { background: rgba(48,208,144,0.12); color: var(--extreme-greed); border: 1px solid rgba(48,208,144,0.25); }
  .risk-medium { background: rgba(232,192,64,0.12); color: var(--neutral); border: 1px solid rgba(232,192,64,0.25); }
  .risk-high   { background: rgba(232,64,64,0.12); color: var(--extreme-fear); border: 1px solid rgba(232,64,64,0.25); }

  .stock-action {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-align: right;
  }

  /* Error */
  .error-box {
    background: rgba(232,64,64,0.08);
    border: 1px solid rgba(232,64,64,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--extreme-fear);
    margin-bottom: 16px;
  }

  .hidden { display: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .gauge-panel { grid-template-columns: 1fr; }
    .gauge-wrap { margin: 0 auto; }
    .api-section { flex-direction: column; align-items: stretch; }
    .stock-card { grid-template-columns: auto 1fr; }
    .stock-right { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <div class="header-title">FEAR &<br><span>GREED</span></div>
    </div>
    <div class="header-sub">Market Sentiment<br>Stock Scanner</div>
  </div>

  <!-- API Key -->
  <div class="api-section">
    <label>API Key</label>
    <input class="api-input" id="apiKey" type="password" placeholder="sk-ant-..." />
  </div>

  <!-- Gauge -->
  <div class="gauge-panel" id="gaugePanel">
    <div class="gauge-wrap">
      <svg class="gauge-svg" viewBox="0 0 160 90">
        <defs>
          <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#e84040"/>
            <stop offset="25%"  stop-color="#e87030"/>
            <stop offset="50%"  stop-color="#e8c040"/>
            <stop offset="75%"  stop-color="#60c060"/>
            <stop offset="100%" stop-color="#30d090"/>
          </linearGradient>
        </defs>
        <!-- Track -->
        <path d="M 10,85 A 70,70 0 0,1 150,85" fill="none" stroke="#1e2230" stroke-width="10" stroke-linecap="round"/>
        <!-- Color arc -->
        <path id="gaugeArc" d="M 10,85 A 70,70 0 0,1 150,85" fill="none" stroke="url(#gaugeGrad)" stroke-width="10" stroke-linecap="round" stroke-dasharray="220" stroke-dashoffset="220"/>
        <!-- Needle -->
        <line id="needle" x1="80" y1="85" x2="80" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"
              style="transform-origin: 80px 85px; transition: transform 1s cubic-bezier(.34,1.56,.64,1);"/>
        <circle cx="80" cy="85" r="5" fill="white"/>
      </svg>
      <div class="gauge-score">
        <div class="gauge-number" id="gaugeNumber">--</div>
        <div class="gauge-label">index</div>
      </div>
    </div>

    <div class="gauge-info">
      <div class="gauge-sentiment" id="gaugeSentiment">LOADING…</div>
      <div class="gauge-meta">
        <div class="meta-item">
          <div class="meta-label">Previous Close</div>
          <div class="meta-value" id="metaPrev">--</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">1 Week Ago</div>
          <div class="meta-value" id="metaWeek">--</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">1 Month Ago</div>
          <div class="meta-value" id="metaMonth">--</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">1 Year Ago</div>
          <div class="meta-value" id="metaYear">--</div>
        </div>
      </div>
    </div>
  </div>

  <button class="scan-btn" id="scanBtn" onclick="runScan()">⚡ SCAN MARKET</button>

  <div id="errorBox" class="error-box hidden"></div>
  <div id="statusBar" class="status-bar hidden">
    <div class="pulse"></div>
    <span id="statusText">Initializing…</span>
  </div>

  <div id="stocksGrid" class="stocks-grid"></div>

</div>

<script>
// ── Fear & Greed fetch ──────────────────────────────────────────────────────
async function fetchFearGreed() {
  const PROXY = 'https://corsproxy.io/?url=';
  const CNN_URL = 'https://production.dataviz.cnn.io/index/fearandgreed/graphdata';
  try {
    const r = await fetch(PROXY + encodeURIComponent(CNN_URL));
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    const fg = d.fear_and_greed;
    return {
      score:    Math.round(fg.score),
      rating:   fg.rating,          // e.g. "Extreme Fear"
      prev:     Math.round(fg.previous_close),
      week:     Math.round(fg.previous_1_week),
      month:    Math.round(fg.previous_1_month),
      year:     Math.round(fg.previous_1_year),
    };
  } catch(e) {
    // Fallback: alternative endpoint
    const r2 = await fetch(PROXY + encodeURIComponent('https://production.dataviz.cnn.io/index/fearandgreed/current'));
    if (!r2.ok) throw new Error('CNN API unavailable: ' + e.message);
    const d2 = await r2.json();
    return {
      score:  Math.round(d2.fear_and_greed?.score ?? d2.score),
      rating: d2.fear_and_greed?.rating ?? d2.rating,
      prev:   Math.round(d2.fear_and_greed?.previous_close ?? 0),
      week:   Math.round(d2.fear_and_greed?.previous_1_week ?? 0),
      month:  Math.round(d2.fear_and_greed?.previous_1_month ?? 0),
      year:   Math.round(d2.fear_and_greed?.previous_1_year ?? 0),
    };
  }
}

// ── Gauge rendering ─────────────────────────────────────────────────────────
function scoreToColor(s) {
  if (s <= 25)  return 'var(--extreme-fear)';
  if (s <= 45)  return 'var(--fear)';
  if (s <= 55)  return 'var(--neutral)';
  if (s <= 75)  return 'var(--greed)';
  return 'var(--extreme-greed)';
}
function ratingLabel(s) {
  if (s <= 25)  return 'EXTREME FEAR';
  if (s <= 45)  return 'FEAR';
  if (s <= 55)  return 'NEUTRAL';
  if (s <= 75)  return 'GREED';
  return 'EXTREME GREED';
}

function renderGauge(score) {
  const col = scoreToColor(score);
  document.documentElement.style.setProperty('--gauge-color', col);

  document.getElementById('gaugeNumber').textContent = score;
  document.getElementById('gaugeSentiment').textContent = ratingLabel(score);

  // Arc: 220px total dash, fill proportional to score
  const arc = document.getElementById('gaugeArc');
  const filled = (score / 100) * 220;
  arc.style.transition = 'stroke-dashoffset 1s cubic-bezier(.34,1.56,.64,1)';
  arc.style.strokeDashoffset = 220 - filled;

  // Needle: -90° = 0, +90° = 100
  const deg = (score / 100) * 180 - 90;
  document.getElementById('needle').style.transform = `rotate(${deg}deg)`;
}

// ── Claude API call ──────────────────────────────────────────────────────────
async function askClaude(apiKey, fgData) {
  const sentiment = ratingLabel(fgData.score);
  const prompt = `The CNN Fear & Greed Index is currently at ${fgData.score}/100 (${sentiment}).

Based on this market sentiment level, recommend exactly 10 stocks that are well-suited to the current environment. Consider:
- At extreme fear/fear: defensive, dividend, value stocks or beaten-down quality names
- At neutral: balanced mix of growth and value
- At greed/extreme greed: momentum stocks, but flag elevated risk

Respond ONLY with a valid JSON array of exactly 10 objects. No markdown, no explanation outside the JSON.
Each object must have these exact keys:
{
  "ticker": "AAPL",
  "name": "Apple Inc.",
  "reason": "One sentence why this fits current sentiment (max 15 words)",
  "risk": "low" | "medium" | "high",
  "action": "Buy" | "Hold" | "Watch"
}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || 'Claude API error ' + res.status);
  }
  const data = await res.json();
  const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
  // Strip markdown fences
  const clean = text.replace(/```json|```/gi, '').trim();
  // Extract JSON array
  const match = clean.match(/\[[\s\S]*\]/);
  if (!match) throw new Error('Could not parse stock recommendations');
  return JSON.parse(match[0]);
}

// ── Render stocks ────────────────────────────────────────────────────────────
function renderStocks(stocks) {
  const grid = document.getElementById('stocksGrid');
  grid.innerHTML = '';
  stocks.forEach((s, i) => {
    const riskClass = s.risk === 'low' ? 'risk-low' : s.risk === 'high' ? 'risk-high' : 'risk-medium';
    const card = document.createElement('div');
    card.className = 'stock-card';
    card.innerHTML = `
      <div class="stock-rank">${String(i+1).padStart(2,'0')}</div>
      <div class="stock-body">
        <div class="stock-header">
          <span class="stock-ticker">${s.ticker}</span>
          <span class="stock-name">${s.name}</span>
        </div>
        <div class="stock-reason">${s.reason}</div>
      </div>
      <div class="stock-right">
        <span class="risk-badge ${riskClass}">${s.risk} risk</span>
        <span class="stock-action">${s.action}</span>
      </div>`;
    grid.appendChild(card);
  });
}

function setStatus(msg) {
  const bar = document.getElementById('statusBar');
  bar.classList.remove('hidden');
  document.getElementById('statusText').textContent = msg;
}
function hideStatus() { document.getElementById('statusBar').classList.add('hidden'); }
function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠ ' + msg;
  box.classList.remove('hidden');
}
function hideError() { document.getElementById('errorBox').classList.add('hidden'); }

// ── Main scan ────────────────────────────────────────────────────────────────
async function runScan() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { showError('Please enter your Anthropic API key'); return; }

  hideError();
  document.getElementById('stocksGrid').innerHTML = '';
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;

  try {
    setStatus('Fetching CNN Fear & Greed Index…');
    const fg = await fetchFearGreed();

    // Update gauge
    renderGauge(fg.score);
    document.getElementById('metaPrev').textContent  = fg.prev  || '--';
    document.getElementById('metaWeek').textContent  = fg.week  || '--';
    document.getElementById('metaMonth').textContent = fg.month || '--';
    document.getElementById('metaYear').textContent  = fg.year  || '--';

    setStatus(`Index: ${fg.score} (${ratingLabel(fg.score)}) — Asking Claude for stock recommendations…`);

    const stocks = await askClaude(apiKey, fg);
    renderStocks(stocks);
    hideStatus();
  } catch(e) {
    hideStatus();
    showError(e.message);
  } finally {
    btn.disabled = false;
  }
}

// Auto-load gauge on page load (no API key needed)
(async () => {
  try {
    setStatus('Loading Fear & Greed Index…');
    const fg = await fetchFearGreed();
    renderGauge(fg.score);
    document.getElementById('metaPrev').textContent  = fg.prev  || '--';
    document.getElementById('metaWeek').textContent  = fg.week  || '--';
    document.getElementById('metaMonth').textContent = fg.month || '--';
    document.getElementById('metaYear').textContent  = fg.year  || '--';
    hideStatus();
  } catch(e) {
    hideStatus();
    // Render neutral fallback
    renderGauge(50);
    document.getElementById('gaugeSentiment').textContent = 'CNN API UNAVAILABLE';
  }
})();
</script>
</body>
</html>
